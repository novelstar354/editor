<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Web IDE</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#1e1e1e">

<!-- Monaco Editor -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.min.js"></script>
</head>

<body>

<!-- TOP BAR -->
<header id="topbar">

<div class="logo">
WEB IDE
</div>

<div class="toolbar">

<button id="newFileBtn">
新規
</button>

<button id="openFileBtn">
開く
</button>

<button id="saveFileBtn">
保存
</button>

<button id="searchBtn">
検索
</button>

<button id="replaceBtn">
置換
</button>

<button id="undoBtn">
Undo
</button>

<button id="redoBtn">
Redo
</button>

<button id="themeBtn">
テーマ
</button>

<button id="previewBtn">
プレビュー
</button>

<button id="fullscreenBtn">
全画面
</button>

</div>

<input
type="file"
id="fileInput"
multiple
hidden
accept=".html,.css,.js,.txt">

</header>

<!-- MAIN -->
<div id="container">

<!-- SIDEBAR -->
<aside id="sidebar">

<div class="sidebar-title">
EXPLORER
</div>

<ul id="fileTree">
</ul>

</aside>

<!-- CENTER -->
<div id="center">

<!-- TABS -->
<div id="tabs"></div>

<!-- EDITOR -->
<div id="editor"></div>

<!-- STATUS -->
<div id="statusbar">

<span id="fileName">
No File
</span>

<span id="language">
TXT
</span>

<span id="position">
Ln 1, Col 1
</span>

<span id="charCount">
0 chars
</span>

</div>

</div>

<!-- PREVIEW -->
<aside id="previewPane">

<div class="preview-header">

<span>Preview</span>

<button id="closePreview">
×
</button>

</div>

<iframe id="previewFrame"></iframe>

</aside>

</div>

<!-- SEARCH MODAL -->
<div id="searchModal" class="modal hidden">

<div class="modal-content">

<h2>検索</h2>

<input
type="text"
id="searchText"
placeholder="検索文字列">

<div class="modal-buttons">

<button id="findNextBtn">
検索
</button>

<button id="closeSearchBtn">
閉じる
</button>

</div>

</div>

</div>

<!-- REPLACE MODAL -->
<div id="replaceModal" class="modal hidden">

<div class="modal-content">

<h2>全置換</h2>

<input
type="text"
id="replaceSearch"
placeholder="検索">

<input
type="text"
id="replaceWith"
placeholder="置換後">

<div class="modal-buttons">

<button id="replaceAllBtn">
全置換
</button>

<button id="closeReplaceBtn">
閉じる
</button>

</div>

</div>

</div>

<!-- LOADING -->
<div id="loadingScreen">

<div class="loader"></div>

<p>Loading Monaco Editor...</p>

</div>

<script src="app.js"></script>

</body>
</html>
